name: FinFlow
options:
  bundleIdPrefix: com.rusessfeed
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  FinFlow:
    type: application
    platform: iOS
    sources:
      - FinFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rusessfeed.FinFlow
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FinFlow
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
  FinFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FinFlowTests
    dependencies:
      - target: FinFlow
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
